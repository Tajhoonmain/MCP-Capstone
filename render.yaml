services:
  # MCP Backend API Service
  - type: web
    name: mcp-academic-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python api_flask.py
    startCommand: python api_flask.py
    healthCheckPath: /health
    healthCheckTimeout: 30
    autoDeploy: true
    
  # MCP Server Service (for internal communication)
  - type: ps
    name: mcp-server
    env: python
    plan: free
    buildCommand: pip install -r mcp_project/requirements.txt && python mcp_project/server.py
    startCommand: python mcp_project/server.py
    autoDeploy: false

# Global environment variables
environment:
  - key: FLASK_ENV
    value: production
  - key: FLASK_DEBUG
    value: false
  - key: SECRET_KEY
    generateValue: true
    value: your-secret-key-here-change-in-production

# Version and deployment settings
version: "1.0.0"
runtime: python
